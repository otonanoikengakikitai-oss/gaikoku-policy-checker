name: weekly-data-update

on:
  schedule:
    - cron: "0 21 * * 1" # 毎週火曜 6:00 JST
  workflow_dispatch:

# news.yml と同じグループで直列化（毎週月曜21:00 UTCに両workflowが同時発火するため、
# push競合で週次データ更新が失敗する事故を防ぐ）
concurrency:
  group: data-commit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: 依存（PDF/Excel解析用・無料OSS）をインストール
        working-directory: scraper
        run: pip install -r requirements.txt
      - name: 収集 → 比較 → 統計 → 関係予算 → 言説検証 → 品質ゲート
        working-directory: scraper
        run: python run.py
      - name: GA4計測IDを注入（リポジトリ変数 GA_MEASUREMENT_ID から）
        env:
          GA_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          printf 'window.GA_MEASUREMENT_ID = "%s";\n' "${GA_ID}" > docs/ga-config.js
      - name: 変更があればコミット
        run: |
          git config user.name "data-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add docs/data docs/ga-config.js
          git diff --cached --quiet || (git commit -m "data: 週次自動更新／GA設定反映" && git push)
